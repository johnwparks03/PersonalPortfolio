
<h1 class="header"><u>Projects</u></h1>
<section class="projects-container">
  <div class="project-card-wrapper" *ngFor="let project of projects">
    <div class="project-card">
      <div class="card-front-wrapper">
        <div class="card-front">
          <img
            class="project-image"
            src="{{ project.img_file_path }}"
            alt="{{ project.name }}"
          />
          <div class="project-name">{{ project.name }}</div>
          <p class="hover-info">(Hover to see more info)</p>
        </div>
      </div>
      <div class="card-back-wrapper">
        <div class="card-back">
          <p class="project-description">{{ project.description }}</p>
          <a class="github-link" href="{{ project.html_url }}" target="_blank"
            >Click to View Project On Github</a
          >
        </div>
      </div>
    </div>
  </div>
</section>
<div class="more-coming-soon">More Coming Soon</div>
